<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PUMP THE COCK</title>
    <meta name="description" content="Real-time market cap visualization with model scaling based on market cap.">
    <meta property="og:title" content="PUMP THE COCK">
    <meta property="og:description" content="Real-time market cap visualization with model scaling based on market cap.">
    <meta property="og:type" content="website">
    <style>
        body {
            margin: 0;
            background: #0a0a12; /* Deep space dark */
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }
        
        #container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }
        
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #e0ffe8; /* Light text */
            z-index: 100;
            background: rgba(10,18,14,0.92);
            padding: 20px;
            border-radius: 10px;
            border: 2px solid #00d67d; /* Pump green accent */
            box-shadow: 0 6px 16px rgba(0,214,125,0.18);
        }
        
        #marketCapDisplay {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        #scaleDisplay {
            font-size: 16px;
        }
        
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #e0ffe8;
            font-size: 20px;
            z-index: 100;
            background: rgba(10,18,14,0.92);
            padding: 20px;
            border-radius: 10px;
            border: 2px solid #00d67d;
        }

        /* Goal widget */
        #goalCard {
            margin-top: 8px;
            padding: 12px 14px;
            background: linear-gradient(180deg, #00ff88 0%, #00d67d 100%);
            border: 2px solid #00d67d;
            border-radius: 12px;
            box-shadow: 0 6px 14px rgba(0,214,125,0.35);
            color: #0a0a12;
            width: 220px;
        }
        #goalTitle { font-weight: 800; font-size: 14px; letter-spacing: 0.3px; }
        #goalNumbers { margin-top: 4px; font-size: 13px; }
        #goalBarWrap {
            width: 100%; height: 10px; background: rgba(255,255,255,0.7); border-radius: 6px; margin-top: 8px;
            overflow: hidden; border: 1px solid rgba(0,214,125,0.6);
        }
        #goalBar {
            height: 100%; background: linear-gradient(90deg, #4dffaa, #00d67d); width: 0%; border-radius: 6px; transition: width 300ms ease;
        }
        #superBadge {
            display: inline-block; margin-top: 8px; background: #00ff88; color: #0a0a12; border-radius: 999px; padding: 3px 8px; font-size: 11px; font-weight: 700;
        }
        #goalCard.celebrate { animation: pulseGlow 850ms ease; }
        @keyframes pulseGlow {
            0% { box-shadow: 0 0 0 rgba(0,255,136,0.6); }
            50% { box-shadow: 0 0 28px rgba(0,255,136,0.8); }
            100% { box-shadow: 0 6px 14px rgba(0,214,125,0.25); }
        }

        /* Top center banner */
        #topBanner {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,214,125,0.95);
            color: #0a0a12;
            font-weight: 800;
            padding: 8px 14px;
            border-radius: 999px;
            border: 1px solid #00ff88;
            z-index: 120;
            box-shadow: 0 4px 12px rgba(0,255,136,0.25);
            letter-spacing: 0.5px;
        }

        /* Goals list */
        #goalList { margin-top: 10px; padding: 10px 12px; background: rgba(10,18,14,0.92); border: 1px solid #00d67d; border-radius: 10px; width: 320px; max-height: none; overflow: visible; color: #e0ffe8; }
        .goalItem { display: flex; align-items: center; gap: 8px; font-size: 12px; color: #e0ffe8; padding: 4px 0; }
        .goalDot { width: 8px; height: 8px; border-radius: 999px; background: #4dffaa; border: 1px solid #00d67d; }
        .goalItem.active .goalDot { background: #00ff88; }
        .goalItem.done { color: #C1C7CD; text-decoration: line-through; opacity: 0.8; }
    </style>
</head>
<body>
    <div id="container">
        <div id="topBanner">Higher Market Cap = Bigger Dick</div>
        <div id="loading">Loading character...</div>
        <div id="ui" style="display: none;">
            <div id="marketCapDisplay">Market Cap: Loading...</div>
            <div id="scaleDisplay">Model Scale: 1.0x</div>
            <div id="dickDisplay">Length: -- inches</div>
                <div id="goalCard" style="width:320px;">
                    <div id="goalTitle">Market Cap Goal</div>
                    <div id="goalNumbers">Next Goal: <b><span id="nextGoal">50.0K</span></b> • <b><span id="goalProgress">0%</span></b></div>
                    <div id="goalBarWrap"><div id="goalBar"></div></div>
                    <div id="superBadge" style="display:none;">100K Super Burst!</div>
                </div>
                <div id="goalList"></div>
			<div id="refreshRow" style="font-size: 12px; color: #666; margin-top: 6px; display: flex; align-items: center; gap: 8px;">
				<span id="refreshIndicator" style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#cccccc;opacity:0;transition:opacity 0.2s, background 0.2s;"></span>
				<span id="lastUpdatedDisplay">Waiting for first update...</span>
				<span id="countdownDisplay" style="margin-left:auto;">Next update —</span>
			</div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fflate@0.8.2/umd/index.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/FBXLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        class JewDickApp {
            constructor() {
                this.scene = null;
                this.camera = null;
                this.renderer = null;
                this.avatar = null;
                this.marketCap = 0;
                // Rolling goals (emit whenever marketCap crosses these)
                this.nextEmissionGoal = 50000; // 50k
                this.nextSuperEmissionGoal = 100000; // 100k
                
                this.init();
				// Jumpy dick animation params
				this.bounceStartMs = (typeof performance !== 'undefined' && performance.now) ? performance.now() : Date.now();
				this.bounceAmplitude = 0.10; // base jump height
				this.bounceSpeed = 3.0; // jumps per second factor
				this.bounceJerk = 0; // transient spikes
				this.ws = null;
				this.wsReconnectDelayMs = 2000; // start at 2s, backoff to max 10s
				this.connectWebSocket();
				// Connect to PumpPortal for real-time token data
				this.connectPumpPortal();
                // Load new primary model
                this.loadPrimaryModel();
				this.fetchInitialMarketCap();
				this.refreshIntervalMs = 10000; // match server broadcast cadence
				this.nextTickAt = Date.now() + this.refreshIntervalMs;
				this.startCountdownTimer();
                this.animate();
            }
            
            init() {
                // Scene setup
                this.scene = new THREE.Scene();
                this.scene.background = new THREE.Color(0x0a0a12); // Deep space dark
                
                // Camera setup
                this.camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
                this.camera.position.set(0, 3.6, 6.2);
                
                // Renderer setup
                this.renderer = new THREE.WebGLRenderer({ antialias: true });
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.shadowMap.enabled = true;
                this.renderer.shadowMap.type = THREE.PCFSoftShadowMap;
                if (THREE && THREE.sRGBEncoding !== undefined) {
                    this.renderer.outputEncoding = THREE.sRGBEncoding;
                }
                document.getElementById('container').appendChild(this.renderer.domElement);
                
                // Controls
                this.controls = new THREE.OrbitControls(this.camera, this.renderer.domElement);
                this.controls.enableDamping = true;
                this.controls.dampingFactor = 0.05;
                // Aim slightly higher to reduce downward tilt on first load
                this.controls.target.set(0, 1.1, 0);
                this.controls.update();
                
				// Balanced lighting (slightly brighter, softer)
		const ambientLight = new THREE.AmbientLight(0xffffff, 0.26);
                this.scene.add(ambientLight);
                
				const hemiLight = new THREE.HemisphereLight(0xffffff, 0xdadada, 0.28);
				this.scene.add(hemiLight);

				const mainLight = new THREE.DirectionalLight(0xffffff, 0.42);
                mainLight.position.set(-2, 3, 2);
                mainLight.castShadow = true;
                mainLight.shadow.mapSize.width = 1024;
                mainLight.shadow.mapSize.height = 1024;
                mainLight.shadow.bias = -0.0005;
                this.scene.add(mainLight);
                
                // Ground plane removed per request (keep logical ground at y = -2)
                
                // Window resize handler
                window.addEventListener('resize', () => this.onWindowResize());
            }

			loadPrimaryModel() {
				// Load pill character with cupseyface and platform
				this.loadCharacter();
				this.loadMoonGround();
			}
            
            loadCharacter() {
                // Create a procedural pill: white top, green bottom (#55d292)
                const pillGroup = new THREE.Group();

                const radius = 1.0; // bigger pill
                const cylinderHeight = 2.2; // taller pill
                const segments = 32;

                const whiteMaterial = new THREE.MeshLambertMaterial({ color: 0xffffff });
                const greenMaterial = new THREE.MeshLambertMaterial({ color: 0x55d292 });

                // Top hemisphere (white)
                const topHemisphereGeometry = new THREE.SphereGeometry(
                    radius,
                    segments,
                    Math.floor(segments / 2),
                    0,
                    Math.PI * 2,
                    0,
                    Math.PI / 2
                );
                const topHemisphere = new THREE.Mesh(topHemisphereGeometry, whiteMaterial);
                topHemisphere.position.y = cylinderHeight / 2;
                topHemisphere.castShadow = true;
                topHemisphere.receiveShadow = true;

                // Bottom hemisphere (green)
                const bottomHemisphereGeometry = new THREE.SphereGeometry(
                    radius,
                    segments,
                    Math.floor(segments / 2),
                    0,
                    Math.PI * 2,
                    Math.PI / 2,
                    Math.PI / 2
                );
                const bottomHemisphere = new THREE.Mesh(bottomHemisphereGeometry, greenMaterial);
                bottomHemisphere.position.y = -cylinderHeight / 2;
                bottomHemisphere.castShadow = true;
                bottomHemisphere.receiveShadow = true;

                // Split cylinder into two halves to color each side
                const halfHeight = cylinderHeight / 2;

                const topCylinderGeometry = new THREE.CylinderGeometry(radius, radius, halfHeight, segments);
                const topCylinder = new THREE.Mesh(topCylinderGeometry, whiteMaterial);
                topCylinder.position.y = halfHeight / 2;
                topCylinder.castShadow = true;
                topCylinder.receiveShadow = true;

                const bottomCylinderGeometry = new THREE.CylinderGeometry(radius, radius, halfHeight, segments);
                const bottomCylinder = new THREE.Mesh(bottomCylinderGeometry, greenMaterial);
                bottomCylinder.position.y = -halfHeight / 2;
                bottomCylinder.castShadow = true;
                bottomCylinder.receiveShadow = true;

                pillGroup.add(topHemisphere);
                pillGroup.add(bottomHemisphere);
                pillGroup.add(topCylinder);
                pillGroup.add(bottomCylinder);

                // Orient pill upright
                pillGroup.position.set(0, 0, 0);

				this.character = pillGroup;
				this.avatar = pillGroup;
				this.scene.add(this.character);

				// Add face texture on white half (front-facing)
				const faceLoader = new THREE.TextureLoader();
				faceLoader.load('cupseyface.png', (tex) => {
					tex.anisotropy = this.renderer.capabilities.getMaxAnisotropy?.() || 1;
					const faceMaterial = new THREE.MeshBasicMaterial({ map: tex, transparent: true });
					const faceSize = radius * 0.9;
					const faceGeometry = new THREE.PlaneGeometry(faceSize, faceSize);
					const faceMesh = new THREE.Mesh(faceGeometry, faceMaterial);
					// Position roughly centered on the white top half, slightly forward on +Z
					faceMesh.position.set(0, cylinderHeight / 2 - radius * 0.2, radius + 0.001);
					faceMesh.renderOrder = 10;
					pillGroup.add(faceMesh);
				}, (progress) => {}, (err) => {
					console.warn('Face texture load failed (cupseyface.png). Place it in /public');
				});

				// Seat character on platform
				this.seatCharacterToMoon();
				
				// Add pill's dick
				this.addDick();
				this.seatCharacterToMoon();

				// Show UI
                document.getElementById('loading').style.display = 'none';
                document.getElementById('ui').style.display = 'block';
            }
            
			connectWebSocket() {
                const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
				this.ws = new WebSocket(`${protocol}//${window.location.host}`);
                
				this.ws.onmessage = (event) => {
					try {
                    const message = JSON.parse(event.data);
                    if (message.type === 'marketcap') {
                        this.updateMarketCap(message.data, message.fallback);
                    }
					} catch {}
                };
                
				this.ws.onopen = () => {
					console.log('WebSocket connected');
					this.wsReconnectDelayMs = 2000; // reset backoff on successful connect
                };
                
				this.ws.onerror = (error) => {
					console.error('WebSocket error:', error);
                };
				
				this.ws.onclose = () => {
					// Exponential backoff reconnect up to 10s
					const delay = this.wsReconnectDelayMs;
					this.wsReconnectDelayMs = Math.min(this.wsReconnectDelayMs * 2, 10000);
					setTimeout(() => this.connectWebSocket(), delay);
				};
			}

			// Fetch SOL price from CoinGecko
			async fetchSolPrice() {
				try {
					const res = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=solana&vs_currencies=usd');
					const data = await res.json();
					this.solPrice = data.solana.usd;
					console.log('💲 SOL Price updated:', this.solPrice);
				} catch (e) {
					console.warn('Failed to fetch SOL price, using fallback');
					this.solPrice = this.solPrice || 150; // fallback
				}
			}

			// Connect to PumpPortal WebSocket for real-time token trades
			async connectPumpPortal() {
				// Fetch token address from server (configured in .env)
				try {
					const res = await fetch('/api/token');
					const data = await res.json();
					if (data.token) {
						this.TOKEN_CA = data.token;
						console.log('🪙 Token loaded from env:', this.TOKEN_CA);
					} else {
						console.error('❌ No TOKEN_MINT configured in .env');
						return;
					}
				} catch (e) {
					console.error('❌ Failed to fetch token from server:', e);
					return;
				}
				
				this.solPrice = 150; // initial fallback
				this.useDexScreener = false; // switch to true when marketcap >= 50k
				this.MIGRATION_THRESHOLD = 50000; // 50k USD
				
				// Fetch SOL price immediately and then every 30 seconds
				this.fetchSolPrice();
				setInterval(() => this.fetchSolPrice(), 30000);
				
				this.pumpWs = new WebSocket('wss://pumpportal.fun/api/data');
				
				this.pumpWs.onopen = () => {
					console.log('🟢 PumpPortal WebSocket connected');
					
					// Subscribe to trades on the specific token
					this.pumpWs.send(JSON.stringify({
						method: "subscribeTokenTrade",
						keys: [this.TOKEN_CA]
					}));
					console.log('📡 Subscribed to token:', this.TOKEN_CA);
				};
				
				this.pumpWs.onmessage = (event) => {
					const data = JSON.parse(event.data);
					
					// Only process trades for our token
					if (data.mint === this.TOKEN_CA && data.marketCapSol !== undefined) {
						// Convert marketCapSol to USD
						const marketCapUSD = data.marketCapSol * this.solPrice;
						console.log('🎯 TRADE:', data.txType?.toUpperCase(), '| MC:', marketCapUSD.toFixed(0), 'USD (', data.marketCapSol.toFixed(2), 'SOL )');
						
						// Check if we should switch to DexScreener
						if (marketCapUSD >= this.MIGRATION_THRESHOLD && !this.useDexScreener) {
							console.log('🚀 Token approaching migration! Switching to DexScreener...');
							this.useDexScreener = true;
							this.startDexScreenerPolling();
						}
						
						// Update the app with new marketcap (only if not using DexScreener yet)
						if (!this.useDexScreener) {
							this.updateMarketCap(marketCapUSD, false);
						}
					} else if (data.message) {
						console.log('📨', data.message);
					}
				};
				
				this.pumpWs.onerror = (error) => {
					console.error('❌ PumpPortal WebSocket error:', error);
				};
				
				this.pumpWs.onclose = () => {
					console.log('🔴 PumpPortal WebSocket closed, reconnecting in 5s...');
					setTimeout(() => this.connectPumpPortal(), 5000);
				};
			}
			
			// Start polling DexScreener when token migrates (backup/post-migration tracking)
			startDexScreenerPolling() {
				console.log('📊 Starting DexScreener polling for:', this.TOKEN_CA);
				
				const pollDexScreener = async () => {
					try {
						const res = await fetch(`https://api.dexscreener.com/latest/dex/tokens/${this.TOKEN_CA}`);
						const data = await res.json();
						
						if (data.pairs && data.pairs.length > 0) {
							// Get the pair with highest liquidity
							const best = data.pairs.sort((a, b) => 
								(Number(b?.liquidity?.usd || 0) - Number(a?.liquidity?.usd || 0))
							)[0];
							
							const marketCap = Number(best.marketCap || best.fdv || 0);
							if (marketCap > 0) {
								console.log('📊 DexScreener MC:', marketCap.toFixed(0), 'USD');
								this.updateMarketCap(marketCap, false);
							}
						}
					} catch (e) {
						console.warn('DexScreener fetch failed:', e);
					}
				};
				
				// Poll immediately then every 10 seconds
				pollDexScreener();
				this.dexScreenerInterval = setInterval(pollDexScreener, 10000);
			}

			// Seat character on moon surface
			seatCharacterToMoon() {
				if (!this.character) return;
				this.character.updateMatrixWorld(true);
				const groundY = this.moonTopY ?? -2.0;
				// Prefer bone-based minY (works better for skinned meshes)
				let minY = Infinity;
				this.character.traverse((obj) => {
					if (obj.isBone) {
						obj.updateMatrixWorld(true);
						const p = new THREE.Vector3();
						obj.getWorldPosition(p);
						if (p.y < minY) minY = p.y;
					}
				});
				// Fallback to Box3 if no bones found
				if (!Number.isFinite(minY)) {
					let restore = false;
					if (this.dickGroup && this.dickGroup.visible !== false) { this.dickGroup.visible = false; restore = true; }
					const box = new THREE.Box3().setFromObject(this.character);
					if (restore) this.dickGroup.visible = true;
					minY = box.min.y;
				}
				const delta = groundY - minY;
				if (Math.abs(delta) > 1e-3) this.character.position.y += delta;
			}

			// Load a platform with pump.fun colors (neon green/teal)
			loadMoonGround() {
				const platformRadius = 4;
				const platformHeight = 0.3;
				
				// Platform base - pump.fun dark teal/green
				const platformGeo = new THREE.CylinderGeometry(platformRadius, platformRadius * 1.1, platformHeight, 48);
				const platformMat = new THREE.MeshLambertMaterial({ color: 0x0d3d2e });
				const platform = new THREE.Mesh(platformGeo, platformMat);
				platform.position.y = -2 - platformHeight / 2;
				platform.receiveShadow = true;
				platform.castShadow = true;
				this.scene.add(platform);
				
				// Top surface - brighter pump.fun green
				const topGeo = new THREE.CircleGeometry(platformRadius, 48);
				const topMat = new THREE.MeshLambertMaterial({ color: 0x00d67d });
				const top = new THREE.Mesh(topGeo, topMat);
				top.rotation.x = -Math.PI / 2;
				top.position.y = -2 + 0.01;
				top.receiveShadow = true;
				this.scene.add(top);
				
				// Glowing neon green ring around the platform edge
				const ringGeo = new THREE.TorusGeometry(platformRadius, 0.1, 16, 64);
				const ringMat = new THREE.MeshBasicMaterial({ color: 0x00ff88 });
				const ring = new THREE.Mesh(ringGeo, ringMat);
				ring.rotation.x = -Math.PI / 2;
				ring.position.y = -2 + 0.02;
				this.scene.add(ring);
				
				// Inner accent ring
				const innerRingGeo = new THREE.TorusGeometry(platformRadius * 0.6, 0.05, 16, 48);
				const innerRingMat = new THREE.MeshBasicMaterial({ color: 0x00ff88 });
				const innerRing = new THREE.Mesh(innerRingGeo, innerRingMat);
				innerRing.rotation.x = -Math.PI / 2;
				innerRing.position.y = -2 + 0.02;
				this.scene.add(innerRing);
				
				this.moonTopY = -2;
			}

		loadWealthyTraveler() {
				try {
					const loader = new THREE.FBXLoader();
				loader.load('Wealthy_Traveler_0715225309_texture.fbx', (object) => {
                    this.traveler = object;
                    this.traveler.scale.setScalar(0.03); // make traveler bigger
						this.traveler.position.set(0.0, 0, 0.6);
						this.traveler.traverse((child) => {
							if (child.isMesh) {
								child.castShadow = true;
								child.receiveShadow = true;
							}
						});
						this.scene.add(this.traveler);
 					// Use traveler as the active character/avatar for downstream logic
 					this.character = this.traveler;
 					this.avatar = this.traveler;
					// Seat character on moon surface
					this.seatCharacterToMoon();
                    // Attach growth-driven dick to traveler and show UI
					this.addDick();
					this.seatCharacterToMoon();
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('ui').style.display = 'block';
				}, undefined, (err) => {
					console.warn('Unable to load Wealthy Traveler FBX. Ensure the file exists in /public.', err);
					});
				} catch (e) {
					console.warn('FBX loader not available.', e);
				}
			}

			// Load user's external model: prefer GLB at /public/source/Untitled.glb
			loadExternalModel() {
				try {
					const gltfLoader = new THREE.GLTFLoader();
					gltfLoader.load('source/Untitled.glb', (gltf) => {
						const model = gltf.scene || gltf.scenes?.[0];
						if (!model) return;
						// Auto-fit scale to target height so it's visible
						const tempBox = new THREE.Box3().setFromObject(model);
						const size = new THREE.Vector3();
						tempBox.getSize(size);
						const targetHeight = 1.6; // units tall
						let scaleFactor = 1.0;
						if (size.y > 0.0001) {
							scaleFactor = targetHeight / size.y;
						}
						model.scale.setScalar(scaleFactor);
						// Place near the pill and in view
						model.position.set(-1.5, 0, 1.4);
						model.traverse((child) => {
							if (child.isMesh) {
								child.castShadow = true;
								child.receiveShadow = true;
							}
						});
						this.scene.add(model);
						// Seat on ground
						const box = new THREE.Box3().setFromObject(model);
						const minY = box.min.y;
						const deltaToGround = this.moonTopY ?? -6.0 - minY;
						if (Math.abs(deltaToGround) > 1e-3) model.position.y += deltaToGround;
						console.log('Loaded GLB model at', model.position, 'scale', scaleFactor);
					}, undefined, (err) => {
						console.warn('Could not load source/Untitled.glb. Ensure the file is in /public/source', err);
					});
				} catch (e) {
					console.warn('GLTF loader not available.', e);
				}
			}

			addTravelerDick() {
